name: .NET-Ubuntu

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v7
      with:
        submodules: recursive
    # Chaos.NaCl ships a root=true .editorconfig that blocks our CS1591 rule; drop a
    # deeper one so its vendored sources don't trip the documented-API check.
    - name: Exempt vendored Chaos.NaCl from the doc check
      shell: bash
      run: printf '[*.cs]\ndotnet_diagnostic.CS1591.severity = none\n' > Chaos.NaCl/Chaos.NaCl/.editorconfig
    - name: Setup .NET
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: 8.0.x
    - name: Restore dependencies
      run: dotnet restore
    - name: Build
      run: dotnet build --no-restore
    - name: Install puttygen for the interop tests (ssh-keygen is preinstalled)
      run: sudo apt-get update && sudo apt-get install -y --no-install-recommends putty-tools
    - name: Test
      run: dotnet test --no-build --verbosity normal
      env:
        # run the ssh-keygen/puttygen interop tests instead of skipping them
        SSHNET_KEYGEN_INTEROP_REQUIRED: "1"
    - uses: actions/upload-artifact@v7
      with:
        name: Sample-ubuntu
        path: |
          SshNet.Keygen.Sample/bin/Debug/net8.0/*
